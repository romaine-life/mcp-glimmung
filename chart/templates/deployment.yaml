apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-glimmung
  namespace: mcp-glimmung
spec:
  replicas: 1
  # Same reason as mcp-github: single-node cluster can't fit two replicas
  # during a rolling-update surge. Recreate keeps the rollout unstuck.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-glimmung
  template:
    metadata:
      labels:
        app: mcp-glimmung
    spec:
      serviceAccountName: mcp-glimmung
      containers:
        - name: mcp-glimmung
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: upstream
              containerPort: {{ .Values.upstreamPort }}
          env:
            - name: PORT
              value: "{{ .Values.upstreamPort }}"
            - name: GLIMMUNG_BASE_URL
              value: {{ .Values.glimmungBaseUrl | quote }}
          readinessProbe:
            # Server binds 127.0.0.1 (loopback only) — exec probe runs
            # inside the container's netns so localhost resolves.
            exec:
              command: [python, "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', {{ .Values.upstreamPort }})); s.close()"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        - name: kube-rbac-proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          args:
            - --insecure-listen-address=0.0.0.0:{{ .Values.proxy.port }}
            - --upstream=http://127.0.0.1:{{ .Values.upstreamPort }}/
            - --config-file=/etc/kube-rbac-proxy/config.yaml
            - --v=2
          ports:
            - name: proxy
              containerPort: {{ .Values.proxy.port }}
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/kube-rbac-proxy
              readOnly: true
          resources:
            {{- toYaml .Values.proxyResources | nindent 12 }}
      volumes:
        - name: proxy-config
          configMap:
            name: kube-rbac-proxy
