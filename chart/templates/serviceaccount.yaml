# SA used by the pod. kube-rbac-proxy uses this SA's token to call
# TokenReview on incoming bearer tokens (granted via the system:auth-
# delegator binding in templates/auth-delegator.yaml). The MCP server
# itself uses the default token path for outbound calls to glimmung. Tank
# /api/internal/* calls use a separate tank-operator audience token projected
# by the Deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-glimmung
  namespace: mcp-glimmung
