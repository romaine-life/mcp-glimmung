# SA used by the pod. kube-rbac-proxy uses this SA's token to call
# TokenReview on incoming bearer tokens (granted via the system:auth-
# delegator binding in templates/auth-delegator.yaml). The MCP server
# itself uses the same projected token to authenticate outbound calls
# to glimmung.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-glimmung
  namespace: mcp-glimmung
