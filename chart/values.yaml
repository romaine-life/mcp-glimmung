# ============================================================================
# mcp-glimmung values
# ============================================================================
# Glimmung lives at glimmung.glimmung.svc inside the cluster. The MCP server
# reads its own pod's projected SA token and presents it as a bearer to
# glimmung; glimmung validates via TokenReview and accepts the SA per its
# K8S_SA_ALLOWLIST. No KV-mounted creds — the SA token is the only secret
# in play.

image:
  repository: romainecr.azurecr.io/mcp-glimmung
  # SHA-pinned. .github/workflows/build.yml rewrites this tag on every push to
  # main via a `[skip ci]` follow-up commit. Quoted so all-digit short-SHAs
  # don't get parsed as floats — see reference_yaml_tag_quoting.md.
  tag: "6ce2256"
  pullPolicy: IfNotPresent

# Loopback-only port the Python uvicorn server listens on.
upstreamPort: 8080

proxy:
  image:
    repository: quay.io/brancz/kube-rbac-proxy
    tag: v0.18.2
    pullPolicy: IfNotPresent
  port: 8443

# Upstream glimmung URL. Defaults to the in-cluster Service.
glimmungBaseUrl: http://glimmung.glimmung.svc

# In-cluster URL to the Tank orchestrator. Tank-facing calls use a dedicated
# projected service account token minted for the tank-operator audience.
orchestratorUrl: http://tank-operator.tank-operator.svc:80

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 768Mi

proxyResources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
